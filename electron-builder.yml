appId: com.picxel.desktop
productName: Picxel
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
  - package.json
asarUnpack:
  - dist/**/*
  - node_modules/keytar/**/*
mac:
  target:
    - dmg
    - zip
  category: public.app-category.graphics-design
win:
  target:
    - nsis
publish:
  provider: github
  owner: JodieMar21
  repo: picxel-puzzle
  releaseType: release
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
